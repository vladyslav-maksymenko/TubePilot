<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{FILENAME}} — Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .player-container {
            max-width: 1200px;
            width: 100%;
            background: #141414;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid #222;
        }

        .player-header {
            padding: 16px 24px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-header .icon {
            font-size: 24px;
        }

        .player-header h1 {
            font-size: 16px;
            font-weight: 500;
            color: #ccc;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        video {
            width: 100%;
            display: block;
            background: #000;
        }

        .player-footer {
            padding: 12px 24px;
            background: #111;
            border-top: 1px solid #222;
            font-size: 12px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="player-header">
            <span class="icon">🎬</span>
            <h1>{{FILENAME}}</h1>
        </div>
        <video controls autoplay preload="metadata">
            <source src="{{VIDEO_URL}}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="player-footer">
            Video Processor Player
        </div>
    </div>
</body>
</html>
